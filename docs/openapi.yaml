            вложения, report — отчёт исполнителя"
          schema:
            enum:
              - main
              - report
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: "Файл: изображение, видео или документ (документ — только
                    задача/чат)"
      responses:
        "201":
          description: Файл загружен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponseDto"
        "400":
          description: Файл не передан, неверный тип или превышен размер
        "403":
          description: Недостаточно прав (роль VIEWER, не владелец поста, не участник
            задачи или не участник диалога)
        "404":
