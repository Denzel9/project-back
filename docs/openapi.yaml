  /posts:
    post:
      operationId: PostsController_create
      summary: Создать пост
      description: "Создаёт пост от имени активного профиля. `ownerId` и `type`
        выставляются из JWT. Для прямого назначения исполнителя без публикации в
        ленте: `isPrivate: true`. Медиа загружаются отдельно: `POST
        /media/upload?postId={id}`."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostDto"
      responses:
        "201":
          description: Созданный пост
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponseDto"
        "403":
          description: Недостаточно прав (роль VIEWER)
      tags: &a8
        - posts
      security: &a9
        - access-token: []
    get:
      operationId: PostsController_list
      summary: Список постов
      description: "Без `ownerId` — посты других пользователей, доступные для вашей
        роли (креаторы — только COMPANY, компании — только CREATOR); приватные
        посты скрыты. С `ownerId` = свой id — все свои посты (включая
        приватные). Поиск: `q` — по title или companyName; `title` — только по
        названию поста. Базовые фильтры: `type` (свои), `isArchived`,
        `isPrivate` (свои). Доп. фильтры: `urgent`, `chips`, `categories`,
        `platforms`, `placementFormats`, `niche`, `tags`, `workFormat`,
        `createdDate`, `deadlineDate`, `budgetType`, `budgetCurrency`,
        `paymentTerms`, `locationCity`, `locationCountry`, `shootingRequired`,
        `minFollowers`, `maxFollowers`, `minEngagementRate`, `verifiedAccount`,
        `experienceWithAds`, `contentStyle`, `exclusivity`, `exclusivityDays`,
        `usageRights`, `usageDurationDays`, `requiresMarking`,
        `requiresContract`, `ndaRequired`, `briefHashtag`, `briefMention`,
        `deliverablePlatform`, `deliverableFormat`. Массивы — через запятую
        (hasSome). Пагинация: `page`, `limit`."
      parameters:
        - name: ownerId
          required: false
          in: query
          description: Фильтр по владельцу. Без параметра — все посты, кроме своих
          schema:
            format: uuid
            type: string
        - name: type
          required: false
          in: query
          description: Фильтр по типу поста. Для чужих постов тип задаётся автоматически
            по роли (CREATOR видит COMPANY и наоборот)
          schema:
            enum:
              - CREATOR
              - COMPANY
            type: string
        - name: isArchived
          required: false
          in: query
          description: Фильтр по архивным постам
          schema:
            type: boolean
        - name: isPrivate
          required: false
          in: query
          description: Фильтр по приватным постам (только для своих постов через ownerId)
          schema:
            type: boolean
        - name: q
          required: false
          in: query
          description: Поиск по названию поста или названию компании-автора
          schema:
            example: реклама
            type: string
        - name: title
          required: false
          in: query
          description: Фильтр по названию поста (contains, без учёта регистра)
          schema:
            type: string
        - name: urgent
          required: false
          in: query
          description: Фильтр по срочности
          schema:
            type: boolean
        - name: chips
          required: false
          in: query
          description: Фильтр по chips (hasSome, через запятую)
          schema:
            type: array
            items:
              type: string
        - name: categories
          required: false
          in: query
          description: Фильтр по categories (hasSome, через запятую)
          schema:
            type: array
            items:
              type: string
        - name: platforms
          required: false
          in: query
          description: Фильтр по platforms (hasSome, через запятую)
          schema:
            type: array
            items:
              type: string
              enum:
                - INSTAGRAM
                - TIKTOK
                - YOUTUBE
                - TELEGRAM
                - VK
                - OTHER
        - name: placementFormats
          required: false
          in: query
          description: Фильтр по placementFormats (hasSome, через запятую)
          schema:
            type: array
            items:
              type: string
              enum:
                - POST
                - STORIES
                - REELS
                - SHORTS
                - INTEGRATION
                - LIVE
        - name: niche
          required: false
          in: query
          description: Фильтр по niche (hasSome, через запятую)
          schema:
            type: array
            items:
              type: string
        - name: tags
          required: false
          in: query
          description: Фильтр по tags (hasSome, через запятую)
          schema:
            type: array
            items:
              type: string
        - name: workFormat
          required: false
          in: query
          schema:
            enum:
              - REMOTE
              - ON_SITE
              - HYBRID
            type: string
        - name: createdDate
          required: false
          in: query
          description: Фильтр по дате создания (календарный день, UTC)
          schema:
            format: date
            example: 2026-06-14
            type: string
        - name: deadlineDate
          required: false
          in: query
          description: Фильтр по дедлайну (календарный день, UTC)
          schema:
            format: date
            example: 2026-06-14
            type: string
        - name: budgetType
          required: false
          in: query
          schema:
            enum:
              - FIXED
              - RANGE
              - NEGOTIABLE
              - BARTER
            type: string
        - name: budgetCurrency
          required: false
          in: query
          schema:
            enum:
              - RUB
              - USD
            type: string
        - name: paymentTerms
          required: false
          in: query
          schema:
            enum:
              - PREPAY
              - POSTPAY
              - 50_50
              - SAFE_DEAL
            type: string
        - name: locationCity
          required: false
          in: query
          description: Фильтр location.city (contains)
          schema:
            type: string
        - name: locationCountry
          required: false
          in: query
          description: Фильтр location.country (contains)
          schema:
            type: string
        - name: shootingRequired
          required: false
          in: query
          description: Фильтр location.shootingRequired
          schema:
            type: boolean
        - name: minFollowers
          required: false
          in: query
          description: Фильтр bloggerRequirements.minFollowers
          schema:
            type: number
        - name: maxFollowers
          required: false
          in: query
          description: Фильтр bloggerRequirements.maxFollowers
          schema:
            type: number
        - name: minEngagementRate
          required: false
          in: query
          description: Фильтр bloggerRequirements.minEngagementRate
          schema:
            type: number
        - name: verifiedAccount
          required: false
          in: query
          description: Фильтр bloggerRequirements.verifiedAccount
          schema:
            type: boolean
        - name: experienceWithAds
          required: false
          in: query
          description: Фильтр bloggerRequirements.experienceWithAds
          schema:
            type: boolean
        - name: contentStyle
          required: false
          in: query
          description: Фильтр bloggerRequirements.contentStyle (hasSome, через запятую)
          schema:
            type: array
            items:
              type: string
              enum:
                - LIFESTYLE
                - REVIEW
                - HUMOR
                - EXPERT
                - UGC
                - UNBOXING
                - TUTORIAL
                - VLOG
                - STORYTELLING
                - BEFORE_AFTER
                - CHALLENGE
                - BUYING
                - PODCAST
                - INTERVIEW
                - ASMR
                - EDUCATIONAL
                - SPORTS
        - name: exclusivity
          required: false
          in: query
          description: Фильтр cooperationDetails.exclusivity
          schema:
            type: boolean
        - name: exclusivityDays
          required: false
          in: query
          description: Фильтр cooperationDetails.exclusivityDays
          schema:
            type: number
        - name: usageRights
          required: false
          in: query
          schema:
            enum:
              - ORGANIC_ONLY
              - PAID_ADS
              - FULL_LICENSE
            type: string
        - name: usageDurationDays
          required: false
          in: query
          description: Фильтр cooperationDetails.usageDurationDays
          schema:
            type: number
        - name: requiresMarking
          required: false
          in: query
          description: Фильтр cooperationDetails.requiresMarking
          schema:
            type: boolean
        - name: requiresContract
          required: false
          in: query
          description: Фильтр cooperationDetails.requiresContract
          schema:
            type: boolean
        - name: ndaRequired
          required: false
          in: query
          description: Фильтр cooperationDetails.ndaRequired
          schema:
            type: boolean
        - name: briefHashtag
          required: false
          in: query
          description: Фильтр brief.hashtags (вхождение значения)
          schema:
            type: string
        - name: briefMention
          required: false
          in: query
          description: Фильтр brief.mentions (вхождение значения)
          schema:
            type: string
        - name: deliverablePlatform
          required: false
          in: query
          schema:
            enum:
              - INSTAGRAM
              - TIKTOK
              - YOUTUBE
              - TELEGRAM
              - VK
              - OTHER
            type: string
        - name: deliverableFormat
          required: false
          in: query
          schema:
            enum:
