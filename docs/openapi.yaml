openapi: 3.0.0
paths:
  /users/{id}:
    get:
      operationId: UsersController_getProfile
      summary: Получить профиль по id
      description: "Публичные данные User: avatar, bio, creatorProfile/companyProfile
        и т.д. Email не возвращается (он хранится в Account). Доступен любому
        авторизованному пользователю."
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Данные профиля
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum:
                          - CREATOR
                          - COMPANY
                      membershipRole:
                        type: string
                        enum:
                          - OWNER
                          - ADMIN
                          - EDITOR
                          - VIEWER
                      contacts:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - phone
                                - telegram
                                - whatsapp
                                - instagram
                                - youtube
                                - vk
                                - website
                                - other
                            value:
                              type: string
                              example: "+79991234567"
                            label:
                              type: string
                              nullable: true
                              example: WhatsApp
                          required:
                            - type
                            - value
                      person:
                        type: object
                        nullable: true
                        properties:
                          height:
                            type: string
                            nullable: true
                            example: "180"
                          weight:
                            type: string
                            nullable: true
                            example: "75"
                          size:
                            type: string
                            nullable: true
                            example: M
                          birthday:
                            type: string
                            nullable: true
                            example: 1995-06-15
                          gender:
                            type: string
                            nullable: true
                            example: male
                          parameters:
                            type: string
                            nullable: true
                            example: 90-60-90
                      phone:
                        type: string
                        nullable: true
                        example: "+79991234567"
                      location:
                        type: string
                        nullable: true
                      avatar:
                        type: string
                        nullable: true
                      bio:
                        type: string
                        nullable: true
                      followers:
                        type: number
                        example: 0
                      aboutMe:
                        type: string
                        nullable: true
                      name:
                        type: string
                      lastName:
                        type: string
                      companyName:
                        type: string
        "404":
          description: Пользователь не найден
      tags: &a1
        - users
      security: &a2
        - access-token: []
  /users/update:
    patch:
      operationId: UsersController_updateProfile
      summary: Обновить активный профиль
      description: "Единственный эндпоинт редактирования профиля. Обновляет **текущий
        активный** User из JWT. Для CREATOR: name, lastName + общие поля. Для
        COMPANY: companyName + общие поля. Общие поля: phone, contacts, person,
        location, avatar, bio, aboutMe, banner. Передайте `null`, чтобы удалить
        nullable поле (phone, bio и т.д.). person мержится с существующим:
        `person: { height: null }` удаляет ключ, `person: null` — весь объект.
        VIEWER получит 403. Для смены профиля перед редактированием —
        switch-profile."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserDto"
      responses:
        "200":
          description: Обновлённый профиль
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum:
                          - CREATOR
                          - COMPANY
                      membershipRole:
                        type: string
                        enum:
                          - OWNER
                          - ADMIN
                          - EDITOR
                          - VIEWER
                      contacts:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - phone
                                - telegram
                                - whatsapp
                                - instagram
                                - youtube
                                - vk
                                - website
                                - other
                            value:
                              type: string
                              example: "+79991234567"
                            label:
                              type: string
                              nullable: true
                              example: WhatsApp
                          required:
                            - type
                            - value
                      person:
                        type: object
                        nullable: true
                        properties:
                          height:
                            type: string
                            nullable: true
                            example: "180"
                          weight:
                            type: string
                            nullable: true
                            example: "75"
                          size:
                            type: string
                            nullable: true
                            example: M
                          birthday:
                            type: string
                            nullable: true
                            example: 1995-06-15
                          gender:
                            type: string
                            nullable: true
                            example: male
                          parameters:
                            type: string
                            nullable: true
                            example: 90-60-90
                      phone:
                        type: string
                        nullable: true
                        example: "+79991234567"
                      location:
                        type: string
                        nullable: true
                      avatar:
                        type: string
                        nullable: true
                      bio:
                        type: string
                        nullable: true
                      followers:
                        type: number
                        example: 0
                      aboutMe:
                        type: string
                        nullable: true
                      name:
                        type: string
                      lastName:
                        type: string
                      companyName:
                        type: string
        "403":
          description: Недостаточно прав (роль VIEWER)
      tags: *a1
      security: *a2
  /auth/register/creator:
    post:
      operationId: AuthController_registerCreator
      summary: Регистрация креатора
      description: "Первый вход: создаёт Account (email/password) и первый профиль
        User с ролью CREATOR. Выставляет cookies access-token и refresh-token.
        Email должен быть уникальным."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCreatorDto"
      responses:
        "201":
          description: Account и профиль созданы, пользователь авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "409":
          description: Email уже зарегистрирован
      tags: &a3
        - auth
  /auth/register/company:
    post:
      operationId: AuthController_registerCompany
      summary: Регистрация компании
      description: "Первый вход: создаёт Account (email/password) и первый профиль
        User с ролью COMPANY. Выставляет cookies. Email должен быть уникальным."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCompanyDto"
      responses:
        "201":
          description: Account и профиль созданы, пользователь авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "409":
          description: Email уже зарегистрирован
      tags: *a3
  /auth/login:
    post:
      operationId: AuthController_login
      summary: Вход
      description: Аутентификация по email и password Account. Активирует первый
        доступный профиль (или тот, что был при последнем switch). Выставляет
        cookies. rememberMe=true — refresh на 30 дней, иначе 7 дней.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "200":
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "401":
          description: Неверный email или пароль
      tags: *a3
  /auth/profiles:
    get:
      operationId: AuthController_listProfiles
      summary: Список доступных профилей
      description: "Все профили User, к которым текущий Account имеет доступ: свои
        (OWNER) и чужие через invite. Используйте для переключателя профилей на
        фронте. Поле isActive — текущий профиль в JWT."
      parameters: []
      responses:
        "200":
          description: Массив профилей с displayName, role, membershipRole
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileSummaryResponse"
      tags: *a3
      security:
        - access-token: []
  /auth/switch-profile:
    post:
      operationId: AuthController_switchProfile
      summary: Переключить активный профиль
      description: Меняет активный User в JWT (sub). Нужен userId из GET
        /auth/profiles. После переключения все запросы (чат, PATCH профиля) идут
        от имени выбранного профиля. Обновляет cookies.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchProfileDto"
      responses:
        "200":
          description: Профиль переключён, новые cookies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "403":
          description: Нет membership к этому профилю
      tags: *a3
      security:
        - access-token: []
  /auth/invites:
    post:
      operationId: AuthController_createInvite
      summary: Пригласить менеджера к существующему профилю
      description: "Отправляет письмо на email приглашённого. userId —
        **существующий** профиль, которым вы управляете. Требуется роль OWNER
        или ADMIN на этом профиле. Роли invite: ADMIN, EDITOR, VIEWER (не
        OWNER). Приглашённый должен зарегистрироваться/войти своим email и
        принять invite."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteDto"
      responses:
        "201":
          description: Приглашение создано, письмо отправлено
        "403":
          description: Недостаточно прав (нужен OWNER/ADMIN на профиле)
      tags: *a3
      security:
        - access-token: []
  /auth/invites/accept:
    post:
      operationId: AuthController_acceptInvite
      summary: Принять приглашение
      description: Принимает invite по token из письма (ссылка
        /invites/accept?token=...). Email залогиненного Account должен совпадать
        с email в приглашении. После accept профиль появится в GET
        /auth/profiles.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteDto"
      responses:
        "200":
          description: Приглашение принято, membership создан
        "400":
          description: Недействительный или просроченный token
        "403":
          description: Email аккаунта не совпадает с email в приглашении
      tags: *a3
      security:
        - access-token: []
  /auth/memberships/{id}:
    delete:
      operationId: AuthController_revokeMembership
      summary: Отозвать доступ к профилю
      description: Удаляет membership другого человека к профилю, которым вы
        управляете. id — membershipId из GET /auth/profiles. Нельзя отозвать
        OWNER. Требуется OWNER или ADMIN на профиле.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: Доступ отозван
        "403":
          description: Недостаточно прав
      tags: *a3
      security:
        - access-token: []
  /auth/recovery-password:
    post:
      operationId: AuthController_recoveryPassword
      summary: Запрос сброса пароля
      description: Отправляет письмо со ссылкой сброса, если Account с таким email
        существует. Всегда возвращает успех (защита от перебора email).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetDto"
      responses:
        "200":
          description: Сообщение об отправке письма (независимо от наличия email)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
      tags: *a3
  /auth/reset-password:
    post:
      operationId: AuthController_resetPassword
      summary: Установить новый пароль
      description: Меняет password Account по token из письма. Token передаёт фронт из
        query-параметра URL письма.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordDto"
      responses:
        "200":
          description: Пароль изменён
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Недействительный или просроченный token
      tags: *a3
  /auth/verify-password:
    post:
      operationId: AuthController_verifyPassword
      summary: Проверить текущий пароль
      description: Проверяет пароль залогиненного Account. Используйте перед сменой
        пароля в настройках. Требует авторизацию (cookie access-token).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPasswordDto"
      responses:
        "200":
          description: Пароль верный
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPasswordResponseDto"
        "401":
          description: Не авторизован
        "403":
          description: Неверный пароль
      tags: *a3
      security:
        - access-token: []
  /auth/refresh:
    post:
      operationId: AuthController_refresh
      summary: Обновить access token
      description: Читает refresh-token из cookie, выдаёт новую пару токенов. Вызывать
        при истечении access-token или proактивно с фронта.
      parameters: []
      responses:
        "200":
          description: Токены обновлены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "401":
          description: Неверный или устаревший refresh token (нужен перелогин)
      tags: *a3
  /auth/logout:
    post:
      operationId: AuthController_logout
      summary: Выход
      description: Очищает cookies access-token и refresh-token.
      parameters: []
      responses:
        "204":
          description: Выход выполнен
      tags: *a3
  /chat/conversations:
    get:
      operationId: ChatController_listConversations
      summary: Список диалогов
      description: "Все 1:1 диалоги активного профиля. Для каждого: собеседник (peer),
        preview последнего сообщения, updatedAt. Отправка сообщений в realtime —
        WebSocket /chat (событие send_message)."
      parameters: []
      responses:
        "200":
          description: Список диалогов с preview последнего сообщения
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatConversationResponse"
      tags: &a4
        - chat
      security: &a5
        - access-token: []
    post:
      operationId: ChatController_createConversation
      summary: Начать или открыть диалог
      description: Создаёт 1:1 диалог с recipientId или возвращает существующий.
        Нельзя написать самому себе. recipientId — userId собеседника.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationDto"
      responses:
        "201":
          description: Диалог создан или найден существующий
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConversationResponse"
        "403":
          description: Нельзя создать диалог с самим собой
        "404":
          description: Получатель не найден
      tags: *a4
      security: *a5
  /chat/conversations/{id}/messages/search:
    get:
      operationId: ChatController_searchMessages
      summary: Поиск сообщений в диалоге
      description: Поиск по тексту content (без учёта регистра). Пагинация page/limit.
        Сообщения возвращаются с media[]. Только для участников диалога.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: q
          required: true
          in: query
          description: Строка поиска по тексту сообщения
          schema:
            example: договор
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Найденные сообщения с пагинацией
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchMessagesResponse"
        "403":
          description: Нет доступа к диалогу
      tags: *a4
      security: *a5
  /chat/conversations/{id}/messages:
    get:
      operationId: ChatController_listMessages
      summary: История сообщений
      description: Сообщения диалога с cursor-пагинацией (от новых к старым). Каждое
        сообщение содержит media[] (фото/видео). cursor — id сообщения, limit по
        умолчанию 50. Только для участников диалога.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: cursor
          required: false
          in: query
          description: "Cursor-пагинация: id сообщения, старше которого загружать историю"
          schema:
            format: uuid
            type: string
        - name: limit
          required: false
          in: query
          description: Сколько сообщений вернуть (по умолчанию 50, макс. 100)
          schema:
            minimum: 1
            maximum: 100
            default: 50
            type: number
      responses:
        "200":
          description: Массив сообщений (хронологический порядок в ответе)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessageResponse"
        "403":
          description: Нет доступа к диалогу
      tags: *a4
      security: *a5
  /chat/conversations/{id}/attachments:
    get:
      operationId: ChatController_listAttachments
      summary: Все вложения диалога
      description: Список всех вложений (фото, видео, документы) в диалоге.
        Опциональный фильтр type=image|video|document. Пагинация page/limit.
        Только для участников.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: type
          required: false
          in: query
          description: "Фильтр по типу: image — image/*, video — video/*, document — PDF,
            Excel, Word"
          schema:
            enum:
              - image
              - video
              - document
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Вложения с контекстом сообщения (messageId, senderId, createdAt)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttachmentsResponse"
        "403":
          description: Нет доступа к диалогу
      tags: *a4
      security: *a5
  /creator/profile:
    get:
      operationId: CreatorController_getProfile
      summary: Краткая информация об активном профиле креатора
      description: Возвращает id, role и membershipRole **активного** профиля из JWT.
        Доступен только если активный профиль — CREATOR (после switch-profile).
        Полные данные профиля — GET /users/:id или PATCH /users/update для
        редактирования.
      parameters: []
      responses:
        "200":
          description: id, role, membershipRole
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "403":
          description: Активный профиль не CREATOR
      tags:
        - creator
      security:
        - access-token: []
  /company/profile:
    get:
      operationId: CompanyController_getProfile
      summary: Краткая информация об активном профиле компании
      description: Возвращает id, role и membershipRole **активного** профиля из JWT.
        Доступен только если активный профиль — COMPANY. Полные данные — GET
        /users/:id, редактирование — PATCH /users/update.
      parameters: []
      responses:
        "200":
          description: id, role, membershipRole
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "403":
          description: Активный профиль не COMPANY
      tags:
        - company
      security:
        - access-token: []
  /media/upload:
    post:
      operationId: MediaController_upload
      summary: Загрузить файл
      description: "Без query — для профиля (`PATCH /users/update`). С `postId` — для
        поста. С `conversationId` — для чата (затем `send_message` с media[]). С
        `taskId` — для задачи (media задачи). `kind=report` — вложение отчёта
        (не смешивается с основными). `forComment=true` + `taskId` — для
        вложения в комментарий (без добавления в media задачи). Фото: JPEG, PNG,
        WebP, GIF до 10 МБ. Видео: MP4, WebM, MOV до 100 МБ. Документы (PDF,
        XLS, XLSX, DOC, DOCX до 25 МБ) — только с `taskId` или
        `conversationId`."
      parameters:
        - name: postId
          required: false
          in: query
          description: UUID поста — файл сохранится в `posts/{postId}/...` и попадёт в
            media поста
          schema:
            type: string
        - name: conversationId
          required: false
          in: query
          description: UUID диалога — файл в `chats/{conversationId}/...` для send_message
          schema:
            type: string
        - name: taskId
          required: false
          in: query
          description: UUID задачи — `tasks/{taskId}/...`. С `forComment=true` — только
            для комментария
          schema:
            type: string
        - name: forComment
          required: false
          in: query
          description: "С `taskId`: загрузка для комментария (ключ tasks/{taskId}/..., не
            попадает в media задачи)"
          schema:
            type: boolean
        - name: kind
          required: false
          in: query
