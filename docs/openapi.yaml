openapi: 3.0.0
paths:
  /users/{id}:
    get:
      operationId: UsersController_getProfile
      summary: Получить профиль по id
      description: "Публичные данные User: avatar, bio, creatorProfile/companyProfile
        и т.д. Email не возвращается (он хранится в Account). Доступен любому
        авторизованному пользователю."
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Данные профиля
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum:
                          - CREATOR
                          - COMPANY
                      membershipRole:
                        type: string
                        enum:
                          - OWNER
                          - ADMIN
                          - EDITOR
                          - VIEWER
                      contacts:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - phone
                                - telegram
                                - whatsapp
                                - instagram
                                - youtube
                                - vk
                                - website
                                - other
                            value:
                              type: string
                              example: "+79991234567"
                            label:
                              type: string
                              nullable: true
                              example: WhatsApp
                          required:
                            - type
                            - value
                      person:
                        type: object
                        nullable: true
                        properties:
                          height:
                            type: string
                            nullable: true
                            example: "180"
                          weight:
                            type: string
                            nullable: true
                            example: "75"
                          size:
                            type: string
                            nullable: true
                            example: M
                          birthday:
                            type: string
                            nullable: true
                            example: 1995-06-15
                          gender:
                            type: string
                            nullable: true
                            example: male
                          parameters:
                            type: string
                            nullable: true
                            example: 90-60-90
                      phone:
                        type: string
                        nullable: true
                        example: "+79991234567"
                      location:
                        type: string
                        nullable: true
                      avatar:
                        type: string
                        nullable: true
                      bio:
                        type: string
                        nullable: true
                      followers:
                        type: number
                        example: 0
                      aboutMe:
                        type: string
                        nullable: true
                      name:
                        type: string
                      lastName:
                        type: string
                      companyName:
                        type: string
        "404":
          description: Пользователь не найден
      tags: &a1
        - users
      security: &a2
        - access-token: []
  /users/update:
    patch:
      operationId: UsersController_updateProfile
      summary: Обновить активный профиль
      description: "Единственный эндпоинт редактирования профиля. Обновляет **текущий
        активный** User из JWT. Для CREATOR: name, lastName + общие поля. Для
        COMPANY: companyName + общие поля. Общие поля: phone, contacts, person,
        location, avatar, bio, aboutMe, banner. Передайте `null`, чтобы удалить
        nullable поле (phone, bio и т.д.). person мержится с существующим:
        `person: { height: null }` удаляет ключ, `person: null` — весь объект.
        VIEWER получит 403. Для смены профиля перед редактированием —
        switch-profile."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserDto"
      responses:
        "200":
          description: Обновлённый профиль
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      role:
                        type: string
                        enum:
                          - CREATOR
                          - COMPANY
                      membershipRole:
                        type: string
                        enum:
                          - OWNER
                          - ADMIN
                          - EDITOR
                          - VIEWER
                      contacts:
                        type: array
                        nullable: true
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - phone
                                - telegram
                                - whatsapp
                                - instagram
                                - youtube
                                - vk
                                - website
                                - other
                            value:
                              type: string
                              example: "+79991234567"
                            label:
                              type: string
                              nullable: true
                              example: WhatsApp
                          required:
                            - type
                            - value
                      person:
                        type: object
                        nullable: true
                        properties:
                          height:
                            type: string
                            nullable: true
                            example: "180"
                          weight:
                            type: string
                            nullable: true
                            example: "75"
                          size:
                            type: string
                            nullable: true
                            example: M
                          birthday:
                            type: string
                            nullable: true
                            example: 1995-06-15
                          gender:
                            type: string
                            nullable: true
                            example: male
                          parameters:
                            type: string
                            nullable: true
                            example: 90-60-90
                      phone:
                        type: string
                        nullable: true
                        example: "+79991234567"
                      location:
                        type: string
                        nullable: true
                      avatar:
                        type: string
                        nullable: true
                      bio:
                        type: string
                        nullable: true
                      followers:
                        type: number
                        example: 0
                      aboutMe:
                        type: string
                        nullable: true
                      name:
                        type: string
                      lastName:
                        type: string
                      companyName:
                        type: string
        "403":
          description: Недостаточно прав (роль VIEWER)
      tags: *a1
      security: *a2
  /auth/register/creator:
    post:
      operationId: AuthController_registerCreator
      summary: Регистрация креатора
      description: "Первый вход: создаёт Account (email/password) и первый профиль
        User с ролью CREATOR. Выставляет cookies access-token и refresh-token.
        Email должен быть уникальным."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCreatorDto"
      responses:
        "201":
          description: Account и профиль созданы, пользователь авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "409":
          description: Email уже зарегистрирован
      tags: &a3
        - auth
  /auth/register/company:
    post:
      operationId: AuthController_registerCompany
      summary: Регистрация компании
      description: "Первый вход: создаёт Account (email/password) и первый профиль
        User с ролью COMPANY. Выставляет cookies. Email должен быть уникальным."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterCompanyDto"
      responses:
        "201":
          description: Account и профиль созданы, пользователь авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "409":
          description: Email уже зарегистрирован
      tags: *a3
  /auth/login:
    post:
      operationId: AuthController_login
      summary: Вход
      description: Аутентификация по email и password Account. Активирует первый
        доступный профиль (или тот, что был при последнем switch). Выставляет
        cookies. rememberMe=true — refresh на 30 дней, иначе 7 дней.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginDto"
      responses:
        "200":
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "401":
          description: Неверный email или пароль
      tags: *a3
  /auth/profiles:
    get:
      operationId: AuthController_listProfiles
      summary: Список доступных профилей
      description: "Все профили User, к которым текущий Account имеет доступ: свои
        (OWNER) и чужие через invite. Используйте для переключателя профилей на
        фронте. Поле isActive — текущий профиль в JWT."
      parameters: []
      responses:
        "200":
          description: Массив профилей с displayName, role, membershipRole
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileSummaryResponse"
      tags: *a3
      security:
        - access-token: []
  /auth/switch-profile:
    post:
      operationId: AuthController_switchProfile
      summary: Переключить активный профиль
      description: Меняет активный User в JWT (sub). Нужен userId из GET
        /auth/profiles. После переключения все запросы (чат, PATCH профиля) идут
        от имени выбранного профиля. Обновляет cookies.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchProfileDto"
      responses:
        "200":
          description: Профиль переключён, новые cookies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "403":
          description: Нет membership к этому профилю
      tags: *a3
      security:
        - access-token: []
  /auth/invites:
    post:
      operationId: AuthController_createInvite
      summary: Пригласить менеджера к существующему профилю
      description: "Отправляет письмо на email приглашённого. userId —
        **существующий** профиль, которым вы управляете. Требуется роль OWNER
        или ADMIN на этом профиле. Роли invite: ADMIN, EDITOR, VIEWER (не
        OWNER). Приглашённый должен зарегистрироваться/войти своим email и
        принять invite."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInviteDto"
      responses:
        "201":
          description: Приглашение создано, письмо отправлено
        "403":
          description: Недостаточно прав (нужен OWNER/ADMIN на профиле)
      tags: *a3
      security:
        - access-token: []
  /auth/invites/accept:
    post:
      operationId: AuthController_acceptInvite
      summary: Принять приглашение
      description: Принимает invite по token из письма (ссылка
        /invites/accept?token=...). Email залогиненного Account должен совпадать
        с email в приглашении. После accept профиль появится в GET
        /auth/profiles.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteDto"
      responses:
        "200":
          description: Приглашение принято, membership создан
        "400":
          description: Недействительный или просроченный token
        "403":
          description: Email аккаунта не совпадает с email в приглашении
      tags: *a3
      security:
        - access-token: []
  /auth/memberships/{id}:
    delete:
      operationId: AuthController_revokeMembership
      summary: Отозвать доступ к профилю
      description: Удаляет membership другого человека к профилю, которым вы
        управляете. id — membershipId из GET /auth/profiles. Нельзя отозвать
        OWNER. Требуется OWNER или ADMIN на профиле.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: Доступ отозван
        "403":
          description: Недостаточно прав
      tags: *a3
      security:
        - access-token: []
  /auth/recovery-password:
    post:
      operationId: AuthController_recoveryPassword
      summary: Запрос сброса пароля
      description: Отправляет письмо со ссылкой сброса, если Account с таким email
        существует. Всегда возвращает успех (защита от перебора email).
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetDto"
      responses:
        "200":
          description: Сообщение об отправке письма (независимо от наличия email)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
      tags: *a3
  /auth/reset-password:
    post:
      operationId: AuthController_resetPassword
      summary: Установить новый пароль
      description: Меняет password Account по token из письма. Token передаёт фронт из
        query-параметра URL письма.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordDto"
      responses:
        "200":
          description: Пароль изменён
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Недействительный или просроченный token
      tags: *a3
  /auth/refresh:
    post:
      operationId: AuthController_refresh
      summary: Обновить access token
      description: Читает refresh-token из cookie, выдаёт новую пару токенов. Вызывать
        при истечении access-token или proактивно с фронта.
      parameters: []
      responses:
        "200":
          description: Токены обновлены
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "401":
          description: Неверный или устаревший refresh token (нужен перелогин)
      tags: *a3
  /auth/logout:
    post:
      operationId: AuthController_logout
      summary: Выход
      description: Очищает cookies access-token и refresh-token.
      parameters: []
      responses:
        "204":
          description: Выход выполнен
      tags: *a3
  /chat/conversations:
    get:
      operationId: ChatController_listConversations
      summary: Список диалогов
      description: "Все 1:1 диалоги активного профиля. Для каждого: собеседник (peer),
        preview последнего сообщения, updatedAt. Отправка сообщений в realtime —
        WebSocket /chat (событие send_message)."
      parameters: []
      responses:
        "200":
          description: Список диалогов с preview последнего сообщения
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatConversationResponse"
      tags: &a4
        - chat
      security: &a5
        - access-token: []
    post:
      operationId: ChatController_createConversation
      summary: Начать или открыть диалог
      description: Создаёт 1:1 диалог с recipientId или возвращает существующий.
        Участники должны быть CREATOR и COMPANY (разные роли). Нельзя написать
        самому себе. recipientId — userId собеседника.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationDto"
      responses:
        "201":
          description: Диалог создан или найден существующий
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConversationResponse"
        "403":
          description: Нельзя создать диалог (одинаковые роли или с самим собой)
        "404":
          description: Получатель не найден
      tags: *a4
      security: *a5
  /chat/conversations/{id}/messages/search:
    get:
      operationId: ChatController_searchMessages
      summary: Поиск сообщений в диалоге
      description: Поиск по тексту content (без учёта регистра). Пагинация page/limit.
        Сообщения возвращаются с media[]. Только для участников диалога.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: q
          required: true
          in: query
          description: Строка поиска по тексту сообщения
          schema:
            example: договор
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Найденные сообщения с пагинацией
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchMessagesResponse"
        "403":
          description: Нет доступа к диалогу
      tags: *a4
      security: *a5
  /chat/conversations/{id}/messages:
    get:
      operationId: ChatController_listMessages
      summary: История сообщений
      description: Сообщения диалога с cursor-пагинацией (от новых к старым). Каждое
        сообщение содержит media[] (фото/видео). cursor — id сообщения, limit по
        умолчанию 50. Только для участников диалога.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: cursor
          required: false
          in: query
          description: "Cursor-пагинация: id сообщения, старше которого загружать историю"
          schema:
            format: uuid
            type: string
        - name: limit
          required: false
          in: query
          description: Сколько сообщений вернуть (по умолчанию 50, макс. 100)
          schema:
            minimum: 1
            maximum: 100
            default: 50
            type: number
      responses:
        "200":
          description: Массив сообщений (хронологический порядок в ответе)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessageResponse"
        "403":
          description: Нет доступа к диалогу
      tags: *a4
      security: *a5
  /chat/conversations/{id}/attachments:
    get:
      operationId: ChatController_listAttachments
      summary: Все вложения диалога
      description: Список всех медиа-вложений (фото/видео) в диалоге. Опциональный
        фильтр type=image|video. Пагинация page/limit. Только для участников.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: type
          required: false
          in: query
          description: "Фильтр по типу: image — только image/*, video — только video/*"
          schema:
            enum:
              - image
              - video
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Вложения с контекстом сообщения (messageId, senderId, createdAt)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAttachmentsResponse"
        "403":
          description: Нет доступа к диалогу
      tags: *a4
      security: *a5
  /creator/profile:
    get:
      operationId: CreatorController_getProfile
      summary: Краткая информация об активном профиле креатора
      description: Возвращает id, role и membershipRole **активного** профиля из JWT.
        Доступен только если активный профиль — CREATOR (после switch-profile).
        Полные данные профиля — GET /users/:id или PATCH /users/update для
        редактирования.
      parameters: []
      responses:
        "200":
          description: id, role, membershipRole
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "403":
          description: Активный профиль не CREATOR
      tags:
        - creator
      security:
        - access-token: []
  /company/profile:
    get:
      operationId: CompanyController_getProfile
      summary: Краткая информация об активном профиле компании
      description: Возвращает id, role и membershipRole **активного** профиля из JWT.
        Доступен только если активный профиль — COMPANY. Полные данные — GET
        /users/:id, редактирование — PATCH /users/update.
      parameters: []
      responses:
        "200":
          description: id, role, membershipRole
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUserResponse"
        "403":
          description: Активный профиль не COMPANY
      tags:
        - company
      security:
        - access-token: []
  /media/upload:
    post:
      operationId: MediaController_upload
      summary: Загрузить фото или видео
      description: "Без query — для профиля (`PATCH /users/update`). С `postId` — для
        поста. С `conversationId` — для чата (затем `send_message` с media[]).
        Фото: JPEG, PNG, WebP, GIF до 10 МБ. Видео: MP4, WebM, MOV до 100 МБ."
      parameters:
        - name: postId
          required: false
          in: query
          description: UUID поста — файл сохранится в `posts/{postId}/...` и попадёт в
            media поста
          schema:
            type: string
        - name: conversationId
          required: false
          in: query
          description: UUID диалога — файл в `chats/{conversationId}/...` для send_message
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл изображения или видео
      responses:
        "201":
          description: Файл загружен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponseDto"
        "400":
          description: Файл не передан, неверный тип или превышен размер
        "403":
          description: Недостаточно прав (роль VIEWER, не владелец поста или не участник
            диалога)
        "404":
          description: Пост не найден
      tags:
        - media
      security:
        - access-token: []
  /posts:
    post:
      operationId: PostsController_create
      summary: Создать пост
      description: "Создаёт пост от имени активного профиля. `ownerId` и `type`
        выставляются из JWT. Медиа загружаются отдельно: `POST
        /media/upload?postId={id}`."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostDto"
      responses:
        "201":
          description: Созданный пост
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponseDto"
        "403":
          description: Недостаточно прав (роль VIEWER)
      tags: &a6
        - posts
      security: &a7
        - access-token: []
    get:
      operationId: PostsController_list
      summary: Список постов
      description: "Без `ownerId` — лента: посты **противоположной** роли (CREATOR →
        COMPANY, COMPANY → CREATOR), без своих постов. С `ownerId` — посты
        владельца (свои: `?ownerId={userId}`), фильтр `type` опционален. Доп.
        фильтры: `isArchived`. Пагинация: `page`, `limit`."
      parameters:
        - name: ownerId
          required: false
          in: query
          description: Посты конкретного владельца. Без параметра — лента без постов
            текущего пользователя
          schema:
            format: uuid
            type: string
        - name: type
          required: false
          in: query
          description: Фильтр по типу поста. Только с ownerId; в ленте тип выставляется
            автоматически
          schema:
            enum:
              - CREATOR
              - COMPANY
            type: string
        - name: isArchived
          required: false
          in: query
          description: Фильтр по архивным постам
          schema:
            type: boolean
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Список постов с пагинацией
      tags: *a6
      security: *a7
  /posts/{id}/applications:
    get:
      operationId: PostsController_listApplications
      summary: Отклики на пост
      description: Только владелец поста. Список откликов с данными соискателя
        (applicant). Фильтр по status, пагинация page/limit.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
        - name: postId
          required: false
          in: query
          description: Фильтр по посту (для входящих откликов)
          schema:
            format: uuid
            type: string
        - name: status
          required: false
          in: query
          schema:
            enum:
              - NEW
              - VIEWED
              - ACCEPTED
              - REJECTED
              - WITHDRAWN
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Список откликов на пост
        "403":
          description: Не владелец поста
        "404":
          description: Пост не найден
      tags: *a6
      security: *a7
  /posts/{id}:
    get:
      operationId: PostsController_findById
      summary: Получить пост по id
      description: Возвращает пост с `media[]` — массив URL для отображения на фронте.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Пост
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponseDto"
        "404":
          description: Пост не найден
      tags: *a6
      security: *a7
    patch:
      operationId: PostsController_update
      summary: Обновить пост
      description: "Только владелец поста (`ownerId`). `ownerId` и `type` изменить
        нельзя. `isArchived: true` — архивировать пост."
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePostDto"
      responses:
        "200":
          description: Обновлённый пост
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponseDto"
        "403":
          description: Недостаточно прав (не владелец или VIEWER)
        "404":
          description: Пост не найден
      tags: *a6
      security: *a7
    delete:
      operationId: PostsController_remove
      summary: Удалить пост
      description: Удаляет пост и связанные записи `PostMedia`. Файлы в S3 не удаляются.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: Пост удалён
        "403":
          description: Недостаточно прав (не владелец или VIEWER)
        "404":
          description: Пост не найден
      tags: *a6
      security: *a7
  /applications:
    post:
      operationId: ApplicationsController_create
      summary: Откликнуться на пост
      description: CREATOR → посты COMPANY, COMPANY → посты CREATOR. Один отклик на
        пост. Нельзя откликнуться на свой или архивный пост.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationDto"
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponseDto"
        "400":
          description: Недопустимый отклик
        "404":
          description: Пост не найден
        "409":
          description: Уже откликались на этот пост
      tags: &a8
        - applications
      security: &a9
        - access-token: []
  /applications/mine:
    get:
      operationId: ApplicationsController_listMine
      summary: Мои отклики
      description: Отклики активного профиля с краткой информацией о посте.
      parameters:
        - name: postId
          required: false
          in: query
          description: Фильтр по посту (для входящих откликов)
          schema:
            format: uuid
            type: string
        - name: status
          required: false
          in: query
          schema:
            enum:
              - NEW
              - VIEWED
              - ACCEPTED
              - REJECTED
              - WITHDRAWN
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Список откликов с пагинацией
      tags: *a8
      security: *a9
  /applications/incoming:
    get:
      operationId: ApplicationsController_listIncoming
      summary: Входящие отклики на мои посты
      description: "Все отклики на посты владельца. Фильтры: postId, status. Содержит
        данные соискателя (applicant)."
      parameters:
        - name: postId
          required: false
          in: query
          description: Фильтр по посту (для входящих откликов)
          schema:
            format: uuid
            type: string
        - name: status
          required: false
          in: query
          schema:
            enum:
              - NEW
              - VIEWED
              - ACCEPTED
              - REJECTED
              - WITHDRAWN
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Список входящих откликов с пагинацией
      tags: *a8
      security: *a9
  /applications/{id}/withdraw:
    patch:
      operationId: ApplicationsController_withdraw
      summary: Отозвать отклик
      description: Только соискатель. Статусы NEW и VIEWED → WITHDRAWN.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponseDto"
        "400":
          description: Нельзя отозвать в текущем статусе
        "403":
          description: Не ваш отклик
        "404":
          description: Отклик не найден
      tags: *a8
      security: *a9
  /applications/{id}/status:
    patch:
      operationId: ApplicationsController_updateStatus
      summary: Изменить статус отклика
      description: Только владелец поста. NEW → VIEWED/ACCEPTED/REJECTED; VIEWED →
        ACCEPTED/REJECTED.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateApplicationStatusDto"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationResponseDto"
        "400":
          description: Недопустимый переход статуса
        "403":
          description: Не владелец поста
        "404":
          description: Отклик не найден
      tags: *a8
      security: *a9
  /favorites/groups:
    get:
      operationId: FavoritesController_listGroups
      summary: Список групп избранного
      description: Группы активного профиля с количеством постов в каждой.
      parameters: []
      responses:
        "200":
          description: Группы избранного
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FavoriteGroupResponseDto"
      tags: &a10
        - favorites
      security: &a11
        - access-token: []
    post:
      operationId: FavoritesController_createGroup
      summary: Создать группу избранного
      description: "Например: «спорт». Имя уникально в рамках профиля."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFavoriteGroupDto"
      responses:
        "201":
          description: Созданная группа
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteGroupResponseDto"
        "409":
          description: Группа с таким названием уже существует
      tags: *a10
      security: *a11
  /favorites/groups/{id}:
    patch:
      operationId: FavoritesController_updateGroup
      summary: Переименовать группу
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFavoriteGroupDto"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteGroupResponseDto"
        "404":
          description: Группа не найдена
        "409":
          description: Группа с таким названием уже существует
      tags: *a10
      security: *a11
    delete:
      operationId: FavoritesController_deleteGroup
      summary: Удалить группу
      description: Посты из группы остаются в избранном без группы.
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: Группа удалена
        "404":
          description: Группа не найдена
      tags: *a10
      security: *a11
  /favorites:
    get:
      operationId: FavoritesController_listFavorites
      summary: Список избранных постов
      description: Все избранные, или фильтр `groupId`, или `ungrouped=true`. Каждый
        элемент содержит полный пост с `media[]`.
      parameters:
        - name: groupId
          required: false
          in: query
          description: Только избранное в указанной группе
          schema:
            format: uuid
            type: string
        - name: ungrouped
          required: false
          in: query
          description: Только избранное без группы (не сочетается с groupId)
          schema:
            type: boolean
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
      responses:
        "200":
          description: Избранное с пагинацией
      tags: *a10
      security: *a11
    post:
      operationId: FavoritesController_addFavorite
      summary: Добавить пост в избранное
      description: "Upsert: повторный вызов обновляет группу. `groupId` опционален."
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFavoriteDto"
      responses:
        "201":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteResponseDto"
        "404":
          description: Пост или группа не найдены
      tags: *a10
      security: *a11
  /favorites/{postId}:
    patch:
      operationId: FavoritesController_moveFavorite
      summary: Переместить избранный пост в группу
      description: "`groupId: null` — убрать из группы, оставить в избранном."
      parameters:
        - name: postId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveFavoriteDto"
      responses:
        "200":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteResponseDto"
        "404":
          description: Пост не найден в избранном или группа не найдена
      tags: *a10
      security: *a11
    delete:
      operationId: FavoritesController_removeFavorite
      summary: Убрать пост из избранного
      parameters:
        - name: postId
          required: true
          in: path
          schema:
            type: string
      responses:
        "204":
          description: Пост убран из избранного
        "404":
          description: Пост не найден в избранном
      tags: *a10
      security: *a11
info:
  title: Project Back API
  description: >-
    # Project Back API


    Backend для marketplace creator ↔ company. Документация для фронтенда и
    AI-ассистентов.


    ## Модель данных


    | Сущность | Что это |

    |----------|---------|

    | **Account** | Login: email + password. Один человек = один Account. |

    | **User** | Публичный профиль: CREATOR или COMPANY. При регистрации
    создаётся один User на Account. |

    | **Membership** | Доступ Account к User: OWNER / ADMIN / EDITOR / VIEWER. |

    | **Invite** | Приглашение другому человеку управлять **существующим**
    профилем. |


    **Активный профиль** — тот, чей `userId` в JWT (`sub`). Переключение: `POST
    /auth/switch-profile`.


    ## Cookies и CORS


    - После login/register/refresh выставляются httpOnly cookies:
    `access-token`, `refresh-token`.

    - Все запросы с `credentials: 'include'`.

    - CORS origin: `CORS_ORIGIN` (обычно http://localhost:3000).


    ## Сценарии


    ### Первый вход

    1. `POST /auth/register/creator` или `/auth/register/company` — создаёт
    Account + первый профиль.

    2. `POST /auth/login` — вход по email/password.


    ### Совместное управление (менеджер)

    1. Владелец: `POST /auth/invites` — email менеджера + `userId`
    **существующего** профиля + роль.

    2. Менеджер: регистрация/логин **своим** email → `POST
    /auth/invites/accept`.

    3. Менеджер: `GET /auth/profiles` → `POST /auth/switch-profile`.


    ### Редактирование профиля

    - `PATCH /users/update` — единственный эндпоинт обновления (поля User +
    name/companyName по роли).

    - VIEWER не может редактировать (403).


    ### Загрузка медиа

    1. `POST /media/upload` — multipart, поле `file` (фото или видео). Ответ:
    публичный `url`.

    2. `PATCH /users/update` — сохранить URL в `avatar`, `banner` и т.д.


    ### Посты с медиа

    1. `POST /posts` — создать пост (без медиа).

    2. `POST /media/upload?postId={id}` — загрузить файлы; они попадут в
    `media[]` поста.

    3. `GET /posts` — лента: CREATOR видит COMPANY, COMPANY видит CREATOR (без
    своих); `?ownerId=` — посты владельца.

    4. `GET /posts/:id` — получить пост с `media[].url` для `<img src>`.


    ### Избранное

    1. `POST /favorites/groups` — создать группу (например, «спорт»).

    2. `POST /favorites` — сохранить пост (postId, опционально groupId).

    3. `GET /favorites` — все избранные; `?groupId=` или `?ungrouped=true`.

    4. `PATCH /favorites/:postId` — переместить в группу или groupId: null.


    ### Отклики на посты

    1. `POST /applications` — отклик (postId + message). CREATOR → COMPANY,
    COMPANY → CREATOR.

    2. `GET /applications/mine` — мои отклики.

    3. `GET /applications/incoming` — входящие на мои посты.

    4. `GET /posts/:id/applications` — отклики на конкретный пост (владелец).

    5. `PATCH /applications/:id/status` — ACCEPTED / REJECTED / VIEWED
    (владелец).


    ### Чат

    - REST: список диалогов и история (сообщения с media[]).

    - WebSocket `/chat`: realtime-сообщения (Socket.IO).

    - Медиа: `POST /media/upload?conversationId=` → `send_message` с media[].

    - Только 1:1 между CREATOR и COMPANY.


    ### Сброс пароля

    1. `POST /auth/recovery-password` — письмо на email Account.

    2. Ссылка: `{FRONTEND_URL}/reset-password?token=...`

    3. `POST /auth/reset-password` — новый пароль Account.


    ## WebSocket /chat


    - URL: `http://localhost:3010/chat`, `withCredentials: true`.

    - `join_conversation` → `{ conversationId }`

    - `send_message` → `{ conversationId, content?, media? }`

    - Ответ: `message`, ошибки: `error`
  version: "1.0"
  contact: {}
tags:
  - name: auth
    description: Регистрация, вход, профили Account, переключение, приглашения
      (invite), сброс пароля
  - name: users
    description: "Публичный профиль User: просмотр по id, редактирование активного профиля"
  - name: creator
    description: Эндпоинты только для активного профиля с ролью CREATOR
  - name: company
    description: Эндпоинты только для активного профиля с ролью COMPANY
  - name: chat
    description: Личные сообщения creator ↔ company (REST). Realtime — WebSocket /chat
  - name: media
    description: Загрузка фото и видео в S3. Профиль — PATCH /users/update; пост — ?postId=
  - name: posts
    description: "Посты creator/company: CRUD, media[] с публичными URL для фронта"
  - name: favorites
    description: Избранные посты активного профиля с группами (спорт и т.д.)
  - name: applications
    description: "Отклики на посты: mine, incoming, статусы NEW/VIEWED/ACCEPTED/REJECTED"
servers:
  - url: http://localhost:3010
    description: Локальная разработка
components:
  securitySchemes:
    cookie:
      type: apiKey
      in: cookie
      name: access-token
  schemas:
    ContactItemDto:
      type: object
      properties:
        type:
          type: string
          enum:
            - phone
            - telegram
            - whatsapp
            - instagram
            - youtube
            - vk
            - website
            - other
          example: phone
          description: "Тип контакта: phone, telegram, instagram и т.д."
        value:
          type: string
          example: "+79991234567"
          description: Номер телефона или URL соцсети
        label:
          type: string
          example: WhatsApp
          description: "Подпись: «Рабочий», «Личный Telegram»"
      required:
        - type
        - value
    PersonDto:
      type: object
      properties:
        height:
          type: string
          example: "180"
          description: Рост
          nullable: true
        weight:
          type: string
          example: "75"
          description: Вес
          nullable: true
        size:
          type: string
          example: M
          description: Размер одежды
          nullable: true
        birthday:
          type: string
          example: 1995-06-15
          description: Дата рождения
          nullable: true
        gender:
          type: string
          example: male
          description: Пол
          nullable: true
        parameters:
          type: string
          example: 90-60-90
          description: Параметры / замеры
          nullable: true
    UpdateCreatorProfileDto:
      type: object
      properties:
        name:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
    UpdateCompanyProfileDto:
      type: object
      properties:
        companyName:
          type: string
          example: Acme Inc.
    UpdateUserDto:
      type: object
      properties:
        name:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        companyName:
          type: string
          example: Acme Inc.
        contacts:
          nullable: true
          description: "Контакты: телефоны и ссылки на соцсети. Передайте null, чтобы
            удалить"
          type: array
          items:
            $ref: "#/components/schemas/ContactItemDto"
        person:
          nullable: true
          description: "Антропометрия и параметры. Merge с существующим объектом; null на
            поле удаляет ключ; person: null — очистить весь блок"
          allOf:
            - $ref: "#/components/schemas/PersonDto"
        phone:
          type: string
          example: "+79991234567"
          nullable: true
          description: Основной телефон. Передайте null, чтобы удалить
        location:
          type: string
          example: Moscow
          nullable: true
          description: Передайте null, чтобы удалить
        avatar:
          type: string
          example: https://example.com/avatar.png
          nullable: true
          description: Передайте null, чтобы удалить
        bio:
          type: string
          example: Short bio
          nullable: true
          description: Передайте null, чтобы удалить
        aboutMe:
          type: string
          example: More about me
          nullable: true
