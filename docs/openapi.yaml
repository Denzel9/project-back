  - name: users
    description: "Публичный профиль User: просмотр по id, редактирование активного профиля"
  - name: creator
    description: Эндпоинты только для активного профиля с ролью CREATOR
  - name: company
    description: Эндпоинты только для активного профиля с ролью COMPANY
  - name: chat
    description: Личные сообщения creator ↔ company (REST). Realtime — WebSocket /chat
  - name: media
    description: "Загрузка в S3: фото/видео (профиль, пост, чат, задача); документы
