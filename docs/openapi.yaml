        - name: updatedDate
          required: false
          in: query
          description: Фильтр по дате обновления задачи (календарный день, UTC)
          schema:
            format: date
            example: 2026-06-14
            type: string
        - name: q
          required: false
          in: query
          description: Поиск по названию поста или названию компании-автора
