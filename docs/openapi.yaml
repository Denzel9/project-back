          schema:
            type: string
        - name: conversationId
          required: false
          in: query
          description: UUID диалога
          schema:
            type: string
        - name: taskId
          required: false
          in: query
          description: UUID задачи
          schema:
            type: string
      responses:
        "204":
          description: Медиа удалено
        "400":
          description: Не указан контекст или указано несколько параметров
        "403":
