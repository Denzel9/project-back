            format: uuid
            type: string
        - name: role
          required: false
          in: query
          description: owner — задачи на мои посты; executor — задачи где я исполнитель
          schema:
            enum:
              - owner
              - executor
            type: string
        - name: status
          required: false
          in: query
          schema:
            enum:
              - PREPARING
              - PENDING_APPROVAL
              - IN_PROGRESS
              - CHECKING
              - REVISION
              - COMPLETED
              - CANCELLED
              - CANCELLED_EXECUTOR
